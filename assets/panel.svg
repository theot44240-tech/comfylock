<svg xmlns="http://www.w3.org/2000/svg" width="680" height="420" viewBox="0 0 680 420" role="img" aria-label="ComfyUI menu with the Save Lockfile button added by the ComfyLock panel">
  <rect width="680" height="420" rx="12" fill="#0b0e14"/>
  <!-- faux node-graph backdrop -->
  <g opacity="0.35">
    <rect x="40" y="60" width="150" height="90" rx="8" fill="#161b22" stroke="#30363d"/>
    <rect x="40" y="60" width="150" height="22" rx="8" fill="#1f6feb33"/>
    <text x="52" y="76" font-family="Segoe UI, Arial" font-size="12" fill="#8b949e">Load Checkpoint</text>
    <rect x="250" y="150" width="150" height="100" rx="8" fill="#161b22" stroke="#30363d"/>
    <rect x="250" y="150" width="150" height="22" rx="8" fill="#23863633"/>
    <text x="262" y="166" font-family="Segoe UI, Arial" font-size="12" fill="#8b949e">KSampler</text>
    <line x1="190" y1="105" x2="250" y2="175" stroke="#3fb95066" stroke-width="2"/>
    <rect x="460" y="80" width="160" height="110" rx="8" fill="#161b22" stroke="#30363d"/>
    <rect x="460" y="80" width="160" height="22" rx="8" fill="#8957e533"/>
    <text x="472" y="96" font-family="Segoe UI, Arial" font-size="12" fill="#8b949e">VAE Decode</text>
  </g>

  <!-- ComfyUI menu panel -->
  <rect x="430" y="230" width="210" height="170" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="535" y="258" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#c9d1d9">ComfyUI</text>
  <line x1="446" y1="268" x2="624" y2="268" stroke="#30363d"/>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#8b949e">
    <rect x="446" y="278" width="178" height="26" rx="6" fill="#21262d"/>
    <text x="458" y="295">Queue Prompt</text>
    <rect x="446" y="308" width="178" height="26" rx="6" fill="#21262d"/>
    <text x="458" y="325">Save / Load</text>
  </g>
  <!-- the ComfyLock button (matches comfylock.js: text "Save Lockfile") -->
  <g transform="translate(446,344)">
    <rect width="178" height="34" rx="8" fill="#1f6feb22" stroke="#58a6ff" stroke-width="1.5"/>
    <!-- mini lock glyph -->
    <g transform="translate(14,9)">
      <path d="M3 8 v-3 a4 4 0 0 1 8 0 v3" fill="none" stroke="#7ee787" stroke-width="2" stroke-linecap="round"/>
      <rect x="0" y="8" width="14" height="9" rx="2.5" fill="#7ee787"/>
    </g>
    <text x="38" y="22" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#58a6ff">Save Lockfile</text>
  </g>
  <text x="446" y="398" font-family="Consolas, monospace" font-size="11" fill="#6e7681">click -&gt; POST /comfylock/pack -&gt; workflow.lock</text>

  <!-- title -->
  <text x="40" y="36" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" fill="#f0f6fc">ComfyLock panel</text>
  <text x="220" y="36" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#768390">one click, straight from the ComfyUI web UI</text>
</svg>
